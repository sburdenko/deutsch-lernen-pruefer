<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch Lernen - Lesen Teil 1</title>
    <link rel="stylesheet" href="style.css?v=3">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="app-container">
        <header>
            <div class="header-titles">
                <h1>Deutsch Lernen</h1>
                <p>Version 2026.04.14</p>
            </div>
            <nav class="top-nav">
                <button class="nav-tab active" data-module="lesen">Lesen</button>
                <button class="nav-tab" data-module="sprachbausteine">Sprachbausteine</button>
                <button class="nav-tab" data-module="hoeren">Hören</button>
                <button class="nav-tab" data-module="schreiben">Schreiben</button>
                <button class="nav-tab" data-module="sprechen">Sprechen</button>
                <button class="nav-tab" data-module="trainer">Wörter</button>
            </nav>
        </header>

        <main id="main-menu" class="view active">
            <div class="menu-card glass-panel">
                <h2>Wähle einen Test</h2>
                <div id="test-list" class="test-list-container">
                    <!-- Test buttons will be injected here dynamically -->
                </div>
            </div>
        </main>

        <main id="test-view" class="view">
            <div class="test-header">
                <button id="btn-back" class="secondary-btn">← Zurück</button>
                <h2 id="test-title">Lesen Teil 1</h2>
            </div>

            <div class="test-content">
                <!-- Dynamically injected layout depending on Teil 1 or Teil 2 -->
                <div id="dynamic-test-container"></div>

                <div class="test-controls glass-panel">
                    <div class="score-display" id="score-display">Punkte: - / 5</div>
                    <button id="btn-submit" class="primary-btn">Test Auswerten</button>
                    <div class="hint-wrapper">
                        <button id="btn-hint" class="secondary-btn">💡 Antworten-Tipp</button>
                        <div id="hint-tooltip" class="hint-tooltip hidden">
                            <!-- Hints will be injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <main id="trainer-view" class="view">
        <div class="test-header">
            <h2 id="trainer-title">Wörter Training</h2>
        </div>

        <div class="trainer-content glass-panel">
            <div class="trainer-settings">
                <label><input type="radio" name="trainer-dir" value="de-ru" checked> Deutsch &rarr; Russisch</label>
                <label><input type="radio" name="trainer-dir" value="ru-de"> Russisch &rarr; Deutsch</label>
            </div>

            <div class="flashcard-container" id="flashcard-container">
                <div class="flashcard" id="flashcard">
                    <div class="flashcard-inner" id="flashcard-inner">
                        <div class="flashcard-front">
                            <div class="fc-word" id="fc-word-front">Wort</div>
                            <div class="hint-container hidden" id="fc-hint-container">
                                <button id="btn-fc-hint" class="secondary-btn">💡 Hinweis</button>
                                <p id="fc-hint-text" class="hidden"></p>
                            </div>
                        </div>
                        <div class="flashcard-back">
                            <div class="fc-word" id="fc-word-back">Слово</div>
                            <div class="fc-example">
                                <p class="ex-de" id="fc-ex-de">Beispiel</p>
                                <p class="ex-ru" id="fc-ex-ru">Пример</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="trainer-controls">
                <button id="btn-next-word" class="primary-btn">Nächstes Wort</button>
            </div>
        </div>
    </main>
    </div>

    <div id="tooltip" class="word-tooltip hidden">
        <div class="tooltip-translation"></div>
        <div class="tooltip-grammar"></div>
        <div class="tooltip-beispiel-label">Beispiel:</div>
        <div class="tooltip-beispiel"></div>
        <div class="tooltip-synonyms-label hidden">Synonyme:</div>
        <div class="tooltip-synonyms"></div>
    </div>

    <script src="app.js?v=10"></script>
</body>

</html>
